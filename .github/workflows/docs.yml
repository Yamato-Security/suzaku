name: Deploy docs to GitHub Pages

# Build the Material for MkDocs site in website/ and publish it to GitHub Pages.
# The "Configure Pages" step below enables Pages automatically (enablement: true),
# so no manual "Settings -> Pages -> Source: GitHub Actions" step is required.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "CHANGELOG.md"
      - "CHANGELOG-Japanese.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: pip install -r website/requirements.txt

      - name: Sync changelog into docs
        run: python website/scripts/sync_changelog.py

      - name: Build site (strict)
        run: mkdocs build --strict --config-file website/mkdocs.yml

      - name: Configure Pages
        uses: actions/configure-pages@v6
        # Auto-enable GitHub Pages (source: GitHub Actions) on the first run so the
        # workflow provisions the Pages site itself. Without this, configure-pages
        # fails with "Get Pages site failed ... Not Found" until someone manually sets
        # Settings -> Pages -> Source: "GitHub Actions".
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
